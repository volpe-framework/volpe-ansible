- name: Common setup (all nodes)
  hosts: volpe_master, volpe_workers
  vars:
    volpe_repo: https://github.com/volpe-framework/volpe-application.git
    volpe_dir: /opt/volpe
    volpe_version: main

  tasks:
    - name: Install podman + pip + git (Debian/Ubuntu)
      become: true
      apt:
        name:
          - podman
          - python3-pip
          - git
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install podman + pip + git (RedHat/Fedora/CentOS)
      become: true
      dnf:
        name:
          - podman
          - python3-pip
          - git
        state: present
      when: ansible_os_family == "RedHat"

    - name: Install podman-compose via pip
      become: true
      pip:
        name: podman-compose
        state: present
        break_system_packages: true


    - name: Create volpe directory owned by ansible_user
      become: true
      file:
        path: "{{ volpe_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"


    - name: Enable systemd linger for ansible_user
      become: true
      command: "loginctl enable-linger {{ ansible_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ ansible_user }}"
      when: ansible_service_mgr == "systemd"


    - name: Clone VolPE repository
      become: false
      git:
        repo: "{{ volpe_repo }}"
        dest: "{{ volpe_dir }}"
        version: "{{ volpe_version }}"
        recursive: true        
        update: true
        accept_hostkey: true   

    - name: Get UID of ansible_user
      command: id -u
      register: ansible_user_uid
      become: false
      changed_when: false

    - name: Enable and start podman socket for user
      become: false
      systemd:
        name: podman.socket
        enabled: true
        state: started
        scope: user
      when: ansible_service_mgr == "systemd"
      ignore_errors: true


- name: Deploy VolPE master
  hosts: volpe_master
  vars:
    volpe_dir: /opt/volpe
    master_api_port: "8000"
    master_grpc_port: "8080"

  tasks:

    - name: Get UID of ansible_user
      command: id -u
      register: ansible_user_uid
      become: false
      changed_when: false

    - name: Write master compose override file
      become: false
      copy:
        dest: "{{ volpe_dir }}/compose.master.yml"
        mode: "0644"
        content: |
          services:
            master:
              build: .
              ports:
                - "{{ master_grpc_port }}:8080"
                - "{{ master_api_port }}:8000"
              security_opt:
                - label=disable
              entrypoint: "./master"
              devices:
                - /dev/fuse:/dev/fuse
              environment:
                - CONTAINER_HOST=unix:///run/user/{{ ansible_user_uid.stdout }}/podman/podman.sock
              restart: unless-stopped

    - name: Build and start master
      become: false
      command:
        cmd: podman-compose -f compose.master.yml up -d --build
        chdir: "{{ volpe_dir }}"
      changed_when: true

    - name: Wait for master gRPC port to be ready
      wait_for:
        port: "{{ master_grpc_port }}"
        host: 0.0.0.0
        timeout: 180
        delay: 5

    - name: Confirm master API is reachable
      uri:
        url: "http://localhost:{{ master_api_port }}/problems"
        status_code: 200
      retries: 10
      delay: 5
      register: api_check
      until: api_check.status == 200


- name: Deploy VolPE workers
  hosts: volpe_workers
  vars:
    volpe_dir: /opt/volpe
    master_grpc_port: "8080"
    master_ip: "{{ hostvars[groups['volpe_master'][0]]['ansible_default_ipv4']['address'] }}"

  tasks:

    - name: Get UID of ansible_user
      command: id -u
      register: ansible_user_uid
      become: false
      changed_when: false

    - name: Ensure compose_configs directory exists
      become: false
      file:
        path: "{{ volpe_dir }}/compose_configs"
        state: directory
        mode: "0755"

    - name: Write worker config .ini
      become: false
      copy:
        dest: "{{ volpe_dir }}/compose_configs/{{ worker_id }}.ini"
        mode: "0644"
        content: |
          [general]
          worker_id={{ worker_id }}
          volpe_master={{ master_ip }}:{{ master_grpc_port }}

          [resources]
          memory_gb={{ worker_memory_gb }}
          cpu_count={{ worker_cpu_count }}

    - name: Write worker compose override file
      become: false
      copy:
        dest: "{{ volpe_dir }}/compose.worker.yml"
        mode: "0644"
        content: |
          services:
            worker:
              build: .
              security_opt:
                - label=disable
              volumes:
                - {{ volpe_dir }}/compose_configs/{{ worker_id }}.ini:/home/podman/config.ini
              entrypoint: "./worker -config-path ./config.ini"
              devices:
                - /dev/fuse:/dev/fuse
              environment:
                - CONTAINER_HOST=unix:///run/user/{{ ansible_user_uid.stdout }}/podman/podman.sock
              restart: unless-stopped

    - name: Build and start worker
      become: false
      command:
        cmd: podman-compose -f compose.worker.yml up -d --build
        chdir: "{{ volpe_dir }}"
      changed_when: true

    - name: Verify worker container is running
      become: false
      command:
        cmd: podman-compose -f compose.worker.yml ps
        chdir: "{{ volpe_dir }}"
      register: worker_status
      changed_when: false

    - name: Print worker status
      debug:
        msg: "{{ worker_status.stdout_lines }}"



- name: Teardown master
  hosts: volpe_master
  tags: [teardown, never]
  vars:
    volpe_dir: /opt/volpe
  tasks:
    - name: Stop and remove master containers
      become: false
      command:
        cmd: podman-compose -f compose.master.yml down
        chdir: "{{ volpe_dir }}"
      changed_when: true

- name: Teardown workers
  hosts: volpe_workers
  tags: [teardown, never]
  vars:
    volpe_dir: /opt/volpe
  tasks:
    - name: Stop and remove worker containers
      become: false
      command:
        cmd: podman-compose -f compose.worker.yml down
        chdir: "{{ volpe_dir }}"
      changed_when: true
