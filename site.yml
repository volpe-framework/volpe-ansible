- name: Common setup (all nodes)
  hosts: volpe_master, volpe_workers
  vars:
    volpe_repo: https://github.com/volpe-framework/volpe-application.git
    volpe_dir: /opt/volpe
    volpe_version: main

  tasks:
    - name: Install Go + podman + git (Debian/Ubuntu)
      become: true
      apt:
        name:
          - golang-go
          - podman
          - git
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install Go + podman + git (RedHat/Fedora/CentOS)
      become: true
      dnf:
        name:
          - golang
          - podman
          - git
        state: present
      when: ansible_os_family == "RedHat"

    - name: Check Go version
      command: go version
      register: go_version
      changed_when: false

    - name: Show Go version
      debug:
        msg: "{{ go_version.stdout }}"

    - name: Get user account details
      become: true
      getent:
        database: passwd
        key: "{{ ansible_user }}"

    - name: Set home directory fact
      set_fact:
        user_home: "{{ getent_passwd[ansible_user][5] }}"

    - name: Show resolved home directory
      debug:
        msg: "HOME will be set to: {{ user_home }}"

    - name: Create volpe directory owned by ansible_user
      become: true
      file:
        path: "{{ volpe_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Enable systemd linger for ansible_user
      become: true
      command: "loginctl enable-linger {{ ansible_user }}"
      args:
        creates: "/var/lib/systemd/linger/{{ ansible_user }}"
      when: ansible_service_mgr == "systemd"

    - name: Get ansible_user uid
      command: "id -u {{ ansible_user }}"
      register: user_uid
      changed_when: false

    - name: Enable and start podman socket for ansible_user
      become: true
      become_user: "{{ ansible_user }}"
      command: systemctl --user enable --now podman.socket
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ user_uid.stdout }}"
      register: podman_socket_enable
      changed_when: false
      failed_when: podman_socket_enable.rc != 0

    - name: Show podman socket enable output
      debug:
        msg: "{{ podman_socket_enable.stdout_lines }}"

    - name: Wait for podman socket to be ready
      wait_for:
        path: "/run/user/{{ user_uid.stdout }}/podman/podman.sock"
        timeout: 30

    - name: Clone VolPE repository
      become: false
      git:
        repo: "{{ volpe_repo }}"
        dest: "{{ volpe_dir }}"
        version: "{{ volpe_version }}"
        recursive: true
        update: true
        accept_hostkey: true

    - name: Get podman socket path
      become: false
      command: podman info -f "{{ '{{' }}.Host.RemoteSocket.Path{{ '}}' }}"
      register: podman_sock_raw
      changed_when: false

    - name: Set podman socket fact
      set_fact:
        podman_socket: "unix://{{ podman_sock_raw.stdout }}"

    - name: Show resolved podman socket path
      debug:
        msg: "CONTAINER_HOST will be set to: {{ podman_socket }}"


- name: Deploy VolPE master
  hosts: volpe_master
  vars:
    volpe_dir: /opt/volpe
    master_api_port: "8000"
    master_grpc_port: "8080"

  tasks:
    - name: Open master ports in UFW (Debian/Ubuntu)
      become: true
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ master_api_port }}"
        - "{{ master_grpc_port }}"
      when: ansible_os_family == "Debian"
      register: ufw_result
      ignore_errors: true

    - name: Show UFW result
      debug:
        msg: "{{ ufw_result }}"
      when: ansible_os_family == "Debian"

    - name: Open master ports in firewalld (RedHat/CentOS)
      become: true
      firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - "{{ master_api_port }}"
        - "{{ master_grpc_port }}"
      when: ansible_os_family == "RedHat"
      register: firewalld_result
      ignore_errors: true

    - name: Show firewalld result
      debug:
        msg: "{{ firewalld_result }}"
      when: ansible_os_family == "RedHat"

    - name: Install volpe-master systemd service
      become: true
      copy:
        dest: /etc/systemd/system/volpe-master.service
        mode: "0644"
        content: |
          [Unit]
          Description=VolPE Master
          After=network.target

          [Service]
          ExecStart=/usr/bin/env go run .
          WorkingDirectory={{ volpe_dir }}/master
          Restart=always
          RestartSec=10
          StartLimitIntervalSec=120
          StartLimitBurst=5
          User={{ ansible_user }}
          Environment="HOME={{ user_home }}"
          Environment="CONTAINER_HOST={{ podman_socket }}"

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      become: true
      systemd:
        daemon_reload: true

    - name: Enable and start volpe-master
      become: true
      systemd:
        name: volpe-master
        state: started
        enabled: true

    - name: Wait for master API port to be ready
      wait_for:
        port: "{{ master_api_port }}"
        host: localhost
        timeout: 120
        delay: 5
      register: port_wait

    - name: Show port wait result
      debug:
        var: port_wait

    - name: Confirm master API is reachable
      uri:
        url: "http://localhost:{{ master_api_port }}/problems"
        status_code: 200
      retries: 10
      delay: 5
      register: api_check
      until: api_check.status == 200

    - name: Show API check result
      debug:
        var: api_check

    - name: Show master service status
      become: true
      command: systemctl status volpe-master
      register: master_status
      changed_when: false
      failed_when: false

    - name: Print master service status
      debug:
        msg: "{{ master_status.stdout_lines }}"


- name: Deploy VolPE workers
  hosts: volpe_workers
  vars:
    volpe_dir: /opt/volpe
    master_grpc_port: "8080"
    master_ip: "{{ hostvars[groups['volpe_master'][0]]['ansible_default_ipv4']['address'] }}"

  tasks:
    - name: Pre-flight — verify master gRPC port is reachable from this worker
      wait_for:
        host: "{{ master_ip }}"
        port: "{{ master_grpc_port }}"
        timeout: 60
        msg: >
          Worker cannot reach master at {{ master_ip }}:{{ master_grpc_port }}.
          Check firewall rules on the master node.

    - name: Install volpe-worker systemd service
      become: true
      copy:
        dest: /etc/systemd/system/volpe-worker.service
        mode: "0644"
        content: |
          [Unit]
          Description=VolPE Worker
          After=network.target

          [Service]
          ExecStart=/usr/bin/env go run .
          WorkingDirectory={{ volpe_dir }}/worker
          Restart=always
          RestartSec=10
          StartLimitIntervalSec=120
          StartLimitBurst=5
          User={{ ansible_user }}
          Environment="HOME={{ user_home }}"
          Environment="VOLPE_MASTER={{ master_ip }}:{{ master_grpc_port }}"
          Environment="CONTAINER_HOST={{ podman_socket }}"

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      become: true
      systemd:
        daemon_reload: true

    - name: Enable and start volpe-worker
      become: true
      systemd:
        name: volpe-worker
        state: started
        enabled: true

    - name: Check volpe-worker service status
      become: true
      command: systemctl status volpe-worker
      register: worker_status
      changed_when: false
      failed_when: false

    - name: Print worker service status
      debug:
        msg: "{{ worker_status.stdout_lines }}"

    - name: Print worker service stderr (if any)
      debug:
        msg: "{{ worker_status.stderr_lines }}"
      when: worker_status.stderr_lines | length > 0


- name: Teardown master
  hosts: volpe_master
  tags: [teardown, never]
  tasks:
    - name: Stop and disable volpe-master
      become: true
      systemd:
        name: volpe-master
        state: stopped
        enabled: false

- name: Teardown workers
  hosts: volpe_workers
  tags: [teardown, never]
  tasks:
    - name: Stop and disable volpe-worker
      become: true
      systemd:
        name: volpe-worker
        state: stopped
        enabled: false
